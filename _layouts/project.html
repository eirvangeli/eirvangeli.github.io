---
layout: default
---
<article class="project-page">
  <a href="{{ '/projects/' | relative_url }}" class="project-page__back">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    <span>Back</span>
  </a>

  <header class="project-page__header">
    <h1 class="project-page__title">{{ page.title }} <span class="project-page__date">{{ page.date | date: "%Y" }}</span></h1>
    <p class="project-page__description">{{ page.description }}</p>
  </header>

  <div class="project-page__gallery{% if page.images.size <= 2 %} gallery--few{% endif %}">
    {% for image in page.images %}
    <figure class="project-page__image fade-in">
      <img src="{{ image | relative_url }}" alt="{{ page.title }} – image {{ forloop.index }}" loading="lazy">
    </figure>
    {% endfor %}
  </div>
</article>
